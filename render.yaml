services:
  - type: web
    name: carousel-studio
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm rebuild better-sqlite3 && npm run build && npx drizzle-kit push
    startCommand: NODE_ENV=production node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is injected by Render automatically (10000) — do NOT override it
